<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Calculator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f5f5f5;
            }
        
        .heading {
            text-align: center;
            margin-bottom: 20px;
        }
        
        .heading h1 {
            font-size: 2.2rem;
            color: #333;
            margin-bottom: 5px;
        }
        
        .calculator {
            background-color: #333;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            padding: 20px;
            width: 300px;
        }
        
        .display {
            background-color: #eee;
            border-radius: 5px;
            padding: 10px 15px;
            margin-bottom: 20px;
            text-align: right;
            font-size: 24px;
            min-height: 40px;
            overflow: hidden;
        }
        
        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-gap: 10px;
        }
        
        button {
            background-color: #4d4d4d;
            border: none;
            border-radius: 5px;
            color: white;
            padding: 15px;
            font-size: 18px;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        
        button:hover {
            background-color: #666;
        }
        
        button:active {
            background-color: #555;
        }
        
        .operator {
            background-color: #ff9500;
        }
        
        .operator:hover {
            background-color: #ffb54d;
        }
        
        .clear, .delete {
            background-color: #b3b3b3;
            color: #333;
        }
        
        .clear:hover, .delete:hover {
            background-color: #ccc;
        }
        
        .equals {
            background-color: #2ecc71;
        }
        
        .equals:hover {
            background-color: #79e2a8;
        }
    </style>
</head>
<body>
    <div class="heading">
        <h1>Calculator</h1>
    </div>
    <div class="calculator">
        <div class="display" id="display">0</div>
        <div class="buttons">
            <button class="clear" onclick="clearDisplay()">C</button>
            <button class="delete" onclick="deleteChar()">DEL</button>
            <button class="operator" onclick="appendToDisplay('%')">%</button>
            <button class="operator" onclick="appendToDisplay('/')">/</button>
            
            <button onclick="appendToDisplay('7')">7</button>
            <button onclick="appendToDisplay('8')">8</button>
            <button onclick="appendToDisplay('9')">9</button>
            <button class="operator" onclick="appendToDisplay('*')">×</button>
            
            <button onclick="appendToDisplay('4')">4</button>
            <button onclick="appendToDisplay('5')">5</button>
            <button onclick="appendToDisplay('6')">6</button>
            <button class="operator" onclick="appendToDisplay('-')">-</button>
            
            <button onclick="appendToDisplay('1')">1</button>
            <button onclick="appendToDisplay('2')">2</button>
            <button onclick="appendToDisplay('3')">3</button>
            <button class="operator" onclick="appendToDisplay('+')">+</button>
            
            <button onclick="appendToDisplay('0')">0</button>
            <button onclick="appendToDisplay('.')">.</button>
            <button class="equals" onclick="calculate()">=</button>
            <button class="operator" onclick="calculateSquareRoot()">√</button>
        </div>
    </div>

    <script>
        let displayValue = '0';
        const display = document.getElementById('display');
        
        function updateDisplay() {
            display.textContent = displayValue;
        }
        
        function appendToDisplay(value) {
            if (displayValue === '0' && value !== '.') {
                displayValue = value;
            } else {
                displayValue += value;
            }
            updateDisplay();
        }
        
        function clearDisplay() {
            displayValue = '0';
            updateDisplay();
        }
        
        function deleteChar() {
            if (displayValue.length === 1) {
                displayValue = '0';
            } else {
                displayValue = displayValue.slice(0, -1);
            }
            updateDisplay();
        }
        
        function calculate() {
            try {
                // Replace × with * for JavaScript evaluation
                let expression = displayValue.replace(/×/g, '*');
                
                // Handle percentage calculations
                if (expression.includes('%')) {
                    expression = expression.replace(/(\d+\.?\d*)%/g, function(match, number) {
                        return number / 100;
                    });
                }
                
                displayValue = eval(expression).toString();
                updateDisplay();
            } catch (error) {
                displayValue = 'Error';
                updateDisplay();
                setTimeout(clearDisplay, 1500);
            }
        }
        
        function calculateSquareRoot() {
            try {
                const value = parseFloat(displayValue);
                if (value < 0) {
                    displayValue = 'Error';
                } else {
                    displayValue = Math.sqrt(value).toString();
                }
                updateDisplay();
            } catch (error) {
                displayValue = 'Error';
                updateDisplay();
                setTimeout(clearDisplay, 1500);
            }
        }
    </script>
</body>
</html>
